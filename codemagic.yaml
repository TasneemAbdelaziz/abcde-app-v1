# Codemagic CI/CD — builds the Alamein Patient app for iPhone (iOS) in the cloud.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-flutter-app/
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ TWO WORKFLOWS                                                            │
# │   1) ios-test     → builds WITHOUT signing. Use first to confirm the app │
# │                     compiles on macOS. The output CANNOT be installed on │
# │                     a real iPhone (just proof it builds).                │
# │   2) ios-release  → builds a SIGNED .ipa and uploads it to TestFlight.   │
# │                     Needs an Apple Developer account ($99/yr).           │
# └─────────────────────────────────────────────────────────────────────────┘

workflows:
  # ───────────────────────── 1) Test build (no Apple account needed) ────────
  ios-test:
    name: iOS test build (no signing)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - flutter_drive.log

  # ───────────────────────── 2) Signed release → TestFlight ─────────────────
  ios-release:
    name: iOS release (signed → TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      # In Codemagic UI: Teams/App settings → Integrations → App Store Connect.
      # Create an API key there and give the integration this exact name.
      app_store_connect: AlameinAppStoreKey
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        # Must match the Bundle ID you register in App Store Connect AND in the
        # Xcode project (ios/Runner.xcodeproj). Change com.example.* → your own.
        bundle_identifier: com.example.abcdeAppV12
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
        # $BUNDLE_ID is provided automatically from ios_signing.bundle_identifier
      - name: Flutter pub get
        script: flutter pub get
      - name: Install CocoaPods
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Email(s) that get notified when the TestFlight build is ready.
        # beta_groups:
        #   - Internal testers
